# Render 部署配置
# 文档: https://render.com/docs/blueprint-spec
#
# ⚠️ 重要提示 (Important):
# Render 免费层的文件系统是临时的(ephemeral)。每次部署(代码推送触发)或冷启动都会
# 重建数据库，所有用户的密码修改将丢失。如需保持密码持久化，请:
#   方案A: 在反馈填写期(6.22-6.30)将 autoDeploy 设为 false，避免意外部署
#   方案B: 附加 Render Disk 并将 DB_PATH 设置为 /var/data/feedback.db
#   方案C: 使用外部数据库(如 Render PostgreSQL, 免费层90天有效)
# 当前使用 INIT_DEFAULT_PASSWORD 作为后备默认密码。

services:
  - type: web
    name: petra-360-feedback
    env: python
    region: singapore          # 新加坡，国内访问延迟 <100ms
    plan: free                 # 免费层: 750h/月, 512MB RAM
    buildCommand: pip install -r requirements.txt
    startCommand: python run_prod.py

    envVars:
      - key: PORT
        value: "10000"
      - key: HOST
        value: "0.0.0.0"
      - key: SECRET_KEY
        generateValue: true    # Render 自动生成 64 位随机密钥
      - key: INIT_DEFAULT_PASSWORD
        value: "petra2026"     # 首次初始化默认密码。⚠️ 若部署清除数据库，所有用户密码重置为此值
      - key: DB_PATH
        value: ""              # 持久化数据库路径（如附加了 Render Disk: /var/data/feedback.db）
      - key: PYTHON_VERSION
        value: "3.13.12"

    # 健康检查
    healthCheckPath: /api/health

    # 自动部署: 反馈填写期(6.22-6.30)建议设为 false 以避免数据库被清除
    autoDeploy: true
