# Render 部署配置
# 文档: https://render.com/docs/blueprint-spec
#
# 数据持久化方案:
#   已启用 Render Disk (1GB, 挂载到 /var/data)，DB_PATH 指向 /var/data/feedback.db。
#   部署、冷启动、实例迁移均不会丢失数据。
#   Render Disk 费用: $0.25/GB/月（约 ¥1.8/月）

services:
  - type: web
    name: petra-360-feedback
    env: python
    region: singapore          # 新加坡，国内访问延迟 <100ms
    plan: free                 # 免费层: 750h/月, 512MB RAM
    buildCommand: pip install -r requirements.txt
    startCommand: python run_prod.py

    envVars:
      - key: PORT
        value: "10000"
      - key: HOST
        value: "0.0.0.0"
      - key: SECRET_KEY
        generateValue: true    # Render 自动生成 64 位随机密钥
      - key: DB_PATH
        value: "/var/data/feedback.db"
      - key: PYTHON_VERSION
        value: "3.13.12"

    # 健康检查
    healthCheckPath: /api/health

    # 反馈填写期(6.22-6.30)关闭自动部署，避免意外推送触发部署
    autoDeploy: false

    # 持久化磁盘: 1GB 挂载到 /var/data，存放 SQLite 数据库
    disk:
      name: petra-data
      mountPath: /var/data
      sizeGB: 1
