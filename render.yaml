# Render 部署配置
# 文档: https://render.com/docs/blueprint-spec
#
# 数据持久化方案:
#   使用 Turso（libsql 云端 SQLite）存储数据。
#   Turso 免费层: 5GB 存储、5 亿行读/月，数据独立于 Render 实例生命周期。
#   部署、冷启动、实例迁移均不会丢失数据。

services:
  - type: web
    name: petra-360-feedback
    env: python
    region: singapore          # 新加坡，国内访问延迟 <100ms
    plan: free                 # 免费层: 750h/月, 512MB RAM
    buildCommand: pip install -r requirements.txt
    startCommand: python run_prod.py

    envVars:
      - key: PORT
        value: "10000"
      - key: HOST
        value: "0.0.0.0"
      - key: SECRET_KEY
        generateValue: true    # Render 自动生成 64 位随机密钥
      - key: TURSO_DATABASE_URL
        sync: false
        value: "libsql://petra-360-feedback-morpheusqiu.aws-ap-northeast-1.turso.io"
      - key: TURSO_AUTH_TOKEN
        sync: false
        # ⚠️ 安全提示: 请勿在 yaml 中明文填写 token（公开仓库风险）。
        #    部署后在 Render Dashboard → petra-360-feedback → Environment 中手动填入。
        value: ""
      - key: PYTHON_VERSION
        value: "3.13.12"

    # 健康检查
    healthCheckPath: /api/health

    # 填写期间关闭自动部署，避免意外推送触发部署
    autoDeploy: false
